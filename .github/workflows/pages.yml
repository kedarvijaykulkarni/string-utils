name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
  workflow_dispatch:   # allow manual re-deploys from the Actions tab

# Permissions required by upload-pages-artifact and deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment runs at a time; never cancel an in-progress deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ─── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build Jekyll site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5
        # Outputs: base_url, base_path, origin — used below so all
        # asset and page URLs are correct for the /string-utils sub-path.

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
          # Pass the canonical base URL so Jekyll resolves links correctly
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  # ─── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
