name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
  workflow_dispatch:   # allow manual re-deploys from the Actions tab

# Grant the GITHUB_TOKEN the permissions required by deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; do not cancel an in-progress deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ─── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build Jekyll site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        # default artifact path is ./_site

  # ─── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
